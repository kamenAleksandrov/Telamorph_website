  <script>
    (() => {
      const cacheKeys = {
        nav: "telamorph-shell-nav-v2",
        footer: "telamorph-shell-footer-v1"
      };

      window.__hydrateTelamorphShell = (targetId, slot) => {
        try {
          const target = document.getElementById(targetId);
          const html = sessionStorage.getItem(cacheKeys[slot]);
          if (!target || !html || target.innerHTML.trim()) return;
          target.innerHTML = html;
          target.dataset.shellHydrated = "true";
        } catch {
          // Ignore storage access failures.
        }
      };
    })();
  </script>
</head>
<body>

  <div id="nav-placeholder"></div>
  <script>
    window.__hydrateTelamorphShell?.("nav-placeholder", "nav");
  </script>

  <main>
    <section class="section" id="community">
      <div class="container">
        <h1 class="section-title reveal">Community</h1>
        <p class="section-subtitle reveal">Connect with us and fellow engineers.</p>

        <div class="value-card reveal" style="max-width: 600px;">
          <h3>Join the Conversation</h3>
          <p>We're building a community of engineers, makers, and enthusiasts. Follow our socials and stay tuned for community events and collaboration opportunities.</p>
          <a href="contact.html" class="btn btn-accent">Get in Touch</a>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>
  <script>
    window.__hydrateTelamorphShell?.("footer-placeholder", "footer");
  </script>

  <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js" defer></script>
  <script src="assets/js/utils.js" defer></script>
  <script src="assets/js/main.js?v=20260427" defer></script>
</body>
