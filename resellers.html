<head>

  <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components/navbar.css">
  <link rel="stylesheet" href="assets/css/components/footer.css">
  <link rel="stylesheet" href="assets/css/components/product-card.css">
  <link rel="stylesheet" href="assets/css/components/buttons.css">
  <link rel="stylesheet" href="assets/css/components/breadcrumb.css">

  <style>
    html, body { background-color: #111215; }
  </style>
  <script>
    (() => {
      const cacheKeys = {
        nav: "telamorph-shell-nav-v2",
        footer: "telamorph-shell-footer-v1"
      };

      window.__hydrateTelamorphShell = (targetId, slot) => {
        try {
          const target = document.getElementById(targetId);
          const html = sessionStorage.getItem(cacheKeys[slot]);
          if (!target || !html || target.innerHTML.trim()) return;
          target.innerHTML = html;
          target.dataset.shellHydrated = "true";
        } catch {
          // Ignore storage access failures.
        }
      };
    })();
  </script>
</head>
<body>

  <div id="nav-placeholder"></div>
  <script>
    window.__hydrateTelamorphShell?.("nav-placeholder", "nav");
  </script>

  <main>
    <section class="section">
      <div class="container">
        <h1 class="section-title reveal">Resellers &amp; Partners</h1>
        <p class="section-subtitle reveal">Our network of trusted distribution partners.</p>

        <div class="row g-4 reveal-stagger">
          <!-- Placeholder partner cards -->
          <div class="col-md-6 col-lg-4 reveal">
            <div class="value-card">
              <h3>Partner Placeholder</h3>
              <p>Partner details, region, and contact info will go here as the network grows.</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Become a Partner CTA -->
    <section class="section" style="background-color: var(--bg-secondary);">
      <div class="container text-center reveal-stagger">
        <h2 class="section-title reveal">Become a Partner</h2>
        <p class="section-subtitle reveal">Interested in distributing Telamorph products? Let's talk.</p>
        <a href="mailto:sales@telamorph.com" class="btn btn-accent btn-lg reveal">Contact Sales</a>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>
  <script>
    window.__hydrateTelamorphShell?.("footer-placeholder", "footer");
  </script>

  <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js" defer></script>
  <script src="assets/js/utils.js" defer></script>
  <script src="assets/js/main.js?v=20260427" defer></script>
</body>
</html>
