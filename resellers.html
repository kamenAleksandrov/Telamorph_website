<!doctype html>
<html lang="en" data-glow="partner">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Become a Partner — Telamorph</title>
    <meta
      name="description"
      content="Interested in distributing Telamorph products? Enquire about becoming a partner."
    />
    <link rel="canonical" href="https://telamorph.com/resellers.html" />
    <link rel="icon" type="image/png" href="assets/images/brand/logo.svg" />
    <link rel="apple-touch-icon" href="assets/images/brand/logo.svg" />

    <meta property="og:title" content="Become a Partner — Telamorph" />
    <meta
      property="og:description"
      content="Interested in distributing Telamorph products? Enquire about becoming a partner."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://telamorph.com/resellers.html" />

    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/components/navbar.css" />
    <link rel="stylesheet" href="assets/css/components/footer.css" />
    <link rel="stylesheet" href="assets/css/components/product-card.css" />
    <link rel="stylesheet" href="assets/css/components/buttons.css" />
    <link rel="stylesheet" href="assets/css/components/breadcrumb.css" />
    <link rel="stylesheet" href="assets/css/components/section-header.css" />
    <link rel="stylesheet" href="assets/css/components/filter-pills.css" />
    <link rel="stylesheet" href="assets/css/components/spec-table.css" />
    <link rel="stylesheet" href="assets/css/components/noscript.css" />
    <link rel="stylesheet" href="assets/css/components/streak.css" />
    <link rel="stylesheet" href="assets/css/components/glow.css" />
    <style>
      html,
      body {
        background-color: #111215;
      }

      /* Clear the transparent overlaid nav, and let the lone CTA fill and
         center within the screen rather than sitting as a small block up top */
      .partner-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        padding-top: calc(var(--nav-height, 72px) + 25px);
        padding-bottom: clamp(2rem, 6vh, 3.5rem);
      }

      .partner-section .container {
        width: 100%;
      }
    </style>
    <script>
      (() => {
        const cacheKeys = {
          nav: "telamorph-shell-nav-v3",
          footer: "telamorph-shell-footer-v2",
        };

        window.__hydrateTelamorphShell = (targetId, slot) => {
          try {
            const target = document.getElementById(targetId);
            const html = sessionStorage.getItem(cacheKeys[slot]);
            if (!target || !html || target.innerHTML.trim()) return;
            target.innerHTML = html;
            target.dataset.shellHydrated = "true";
          } catch {
            // Ignore storage access failures.
          }
        };
      })();
    </script>

    <!-- Seeds the cross-page glow slide before first paint (see glow.css). -->
    <script src="assets/js/glow.js"></script>
  </head>
  <body>
    <div id="nav-placeholder"></div>
    <script>
      window.__hydrateTelamorphShell?.("nav-placeholder", "nav");
    </script>

    <main>
      <!-- Become a Partner CTA -->
      <section class="section partner-section">
        <div class="container text-center reveal-stagger">
          <h1 class="section-title reveal">Become a Partner</h1>
          <p class="section-subtitle reveal">
            Interested in distributing Telamorph products? Let's talk.
          </p>
          <a
            href="contact.html?type=partnership"
            class="btn btn-accent btn-lg reveal"
            >Get in Touch</a
          >
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>
    <script>
      window.__hydrateTelamorphShell?.("footer-placeholder", "footer");
    </script>

    <script
      src="assets/vendor/bootstrap/bootstrap.bundle.min.js"
      defer
    ></script>
    <script src="assets/js/utils.js" defer></script>
    <script src="assets/js/main.js?v=20260427" defer></script>
  </body>
</html>
