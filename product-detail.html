  <head>

    <link rel="icon" type="image/svg+xml" href="assets/images/brand/logo.svg" />
    <link rel="apple-touch-icon" href="assets/images/brand/logo.svg" />

    <!-- Open Graph + Twitter (dynamically populated by product-detail.js) -->
    <meta property="og:site_name" content="Telamorph" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" id="og-title" content="" />
    <meta property="og:description" id="og-description" content="" />
    <meta property="og:type" content="product" />

    <meta name="twitter:description" id="tw-description" content="" />
    <meta name="twitter:image" id="tw-image" content="" />

    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/components/navbar.css" />
    <link rel="stylesheet" href="assets/css/components/footer.css" />
    <link rel="stylesheet" href="assets/css/components/product-card.css" />
    <link rel="stylesheet" href="assets/css/components/buttons.css" />
    <link rel="stylesheet" href="assets/css/components/breadcrumb.css" />
    <link rel="stylesheet" href="assets/css/components/section-header.css" />
    <link rel="stylesheet" href="assets/css/components/noscript.css" />
    <link rel="stylesheet" href="assets/css/components/streak.css" />
    <link rel="stylesheet" href="assets/css/pages/product-detail.css" />

    <!-- Structured Data: Product (populated by JS) -->
    <script type="application/ld+json" id="product-jsonld"></script>
    <style>
      html,
      body {
        background-color: #111215;
      }
    </style>
    <script>
      (() => {
        const cacheKeys = {
          nav: "telamorph-shell-nav-v4",
          footer: "telamorph-shell-footer-v2",
        };

        window.__hydrateTelamorphShell = (targetId, slot) => {
          try {
            const target = document.getElementById(targetId);
            const html = sessionStorage.getItem(cacheKeys[slot]);
            if (!target || !html || target.innerHTML.trim()) return;
            target.innerHTML = html;
            target.dataset.shellHydrated = "true";
          } catch {
            // Ignore storage access failures.
          }
        };
      })();
    </script>
  </head>
  <body>
    <div id="nav-placeholder"></div>
    <script>
      window.__hydrateTelamorphShell?.("nav-placeholder", "nav");
    </script>

    <noscript>
      <div class="noscript-banner">
        This site requires JavaScript to display product details.
      </div>
    </noscript>

    <main>
      <section class="pd-section">
        <div class="container">
          <nav id="breadcrumb" aria-label="breadcrumb" class="reveal"></nav>

          <div id="product-content" class="reveal-stagger">
            <!-- Populated by product-detail.js -->
          </div>

          <!-- Fallback if product not found -->
          <div
            id="product-not-found"
            class="text-center py-5 reveal-stagger"
            style="display: none"
          >
            <h2 class="reveal">Product Not Found</h2>
            <p class="text-secondary reveal">
              The product you're looking for doesn't exist or has been removed.
            </p>
            <a href="industrial.html" class="btn btn-accent reveal"
              >Browse Industrial Products</a
            >
          </div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>
    <script>
      window.__hydrateTelamorphShell?.("footer-placeholder", "footer");
    </script>

    <script
      src="assets/vendor/bootstrap/bootstrap.bundle.min.js"
      defer
    ></script>
    <script src="assets/js/utils.js" defer></script>
    <script src="assets/js/main.js?v=20260427" defer></script>
    <script src="assets/js/product-detail.js" defer></script>
  </body>
</html>
