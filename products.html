<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Telamorph Engineering Hardware</title>
  <meta name="description" content="Browse Telamorph's product range — automotive body kits, carbon fiber roof boxes, astronomy hardware, industrial solutions, and custom development services.">
  <link rel="canonical" href="https://telamorph.com/products.html">

  <!-- Open Graph -->
  <meta property="og:title" content="Products — Telamorph">
  <meta property="og:description" content="Precision sensors, actuators, and engineering hardware.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://telamorph.com/products.html">

  <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components/navbar.css">
  <link rel="stylesheet" href="assets/css/components/footer.css">
  <link rel="stylesheet" href="assets/css/components/product-card.css">
  <link rel="stylesheet" href="assets/css/components/buttons.css">
  <link rel="stylesheet" href="assets/css/components/breadcrumb.css">
  <link rel="stylesheet" href="assets/css/components/section-header.css">
  <link rel="stylesheet" href="assets/css/components/filter-pills.css">
  <link rel="stylesheet" href="assets/css/components/spec-table.css">
  <link rel="stylesheet" href="assets/css/components/noscript.css">
  <link rel="stylesheet" href="assets/css/components/streak.css">
  <link rel="stylesheet" href="assets/css/pages/products.css">
  <style>
    html, body { background-color: #111215; }
  </style>
  <script>
    (() => {
      const cacheKeys = {
        nav: "telamorph-shell-nav-v1",
        footer: "telamorph-shell-footer-v1"
      };

      window.__hydrateTelamorphShell = (targetId, slot) => {
        try {
          const target = document.getElementById(targetId);
          const html = sessionStorage.getItem(cacheKeys[slot]);
          if (!target || !html || target.innerHTML.trim()) return;
          target.innerHTML = html;
          target.dataset.shellHydrated = "true";
        } catch {
          // Ignore storage access failures.
        }
      };
    })();
  </script>
</head>
<body>

  <div id="nav-placeholder"></div>
  <script>
    window.__hydrateTelamorphShell?.("nav-placeholder", "nav");
  </script>

  <noscript>
    <div class="noscript-banner">This site requires JavaScript to display product listings.</div>
  </noscript>

  <main>
    <section class="products-header">
      <div class="container">
        <nav id="breadcrumb" aria-label="breadcrumb" class="reveal"></nav>
        <h1 class="section-title reveal">Products</h1>
        <p class="section-subtitle reveal">Browse our full range of engineering hardware.</p>
      </div>
    </section>

    <section class="section" style="padding-top: 0;">
      <div class="container">
        <!-- Category Filters -->
        <div id="category-filters" class="products-filters reveal"></div>

        <!-- Product Grid -->
        <div id="product-grid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 products-grid reveal-stagger">
          <!-- Populated by JS -->
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>
  <script>
    window.__hydrateTelamorphShell?.("footer-placeholder", "footer");
  </script>

  <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js" defer></script>
  <script src="assets/js/utils.js" defer></script>
  <script src="assets/js/main.js" defer></script>
  <script src="assets/js/products.js" defer></script>
</body>
</html>
